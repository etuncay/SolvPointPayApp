<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>EPay BackOffice — Dijital Cüzdanlar</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="customers-data.jsx"></script>
<script type="text/babel" src="agents-data.jsx"></script>
<script type="text/babel" src="wallets-data.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="wallets-page.jsx"></script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "lang": "tr",
    "role": "compliance",
    "density": "standard",
    "textSize": "standard"
  }/*EDITMODE-END*/;

  function WalletsApp() {
    return (
      <Shell activeNav="wallets" tweakDefaults={TWEAK_DEFAULTS}>
        {(p) => <WalletsPage {...p} />}
      </Shell>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<WalletsApp />);
</script>
</body>
</html>
